  <style>
    :root {
      --bg: #0b1020;
      --bg-elev: #111733;
      --line: #232b50;
      --text: #e6ecff;
      --text-dim: #a6b0d6;
      --accent: #5eead4;
      --accent-glow: rgba(94, 234, 212, 0.18);
      --max: 1120px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      background-image:
        radial-gradient(1200px 600px at 80% -10%, rgba(129, 140, 248, 0.18), transparent 60%),
        radial-gradient(900px 500px at -10% 10%, rgba(94, 234, 212, 0.12), transparent 60%);
      background-attachment: fixed;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--text); }
    .nav {
      position: sticky; top: 0; z-index: 50;
      backdrop-filter: saturate(140%) blur(12px);
      background: rgba(11, 16, 32, 0.75);
      border-bottom: 1px solid var(--line);
    }
    .nav-inner {
      max-width: var(--max); margin: 0 auto; padding: 14px 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .brand { font-weight: 700; color: var(--text); display: flex; gap: 10px; align-items: center; }
    .brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }
    .nav-links { display: flex; gap: 8px; }
    .nav-links a {
      color: var(--text-dim); padding: 8px 14px; border-radius: 10px;
      font-size: 14.5px; font-weight: 500;
    }
    .nav-links a:hover { color: var(--text); background: var(--bg-elev); }
    .nav-cta {
      background: var(--accent); color: #0b1020 !important; font-weight: 600;
    }
    main { max-width: var(--max); margin: 0 auto; padding: 40px 24px 80px; }
    h1 { font-size: clamp(28px, 4vw, 40px); margin: 0 0 8px; letter-spacing: -0.02em; }
    .lede { color: var(--text-dim); margin: 0 0 24px; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 18px; border-radius: 12px;
      font-weight: 600; font-size: 14px;
      border: 1px solid transparent;
    }
    .btn-primary { background: var(--accent); color: #0b1020; }
    .btn-primary:hover { background: var(--text); color: #0b1020; }
    .btn-ghost { border-color: var(--line); color: var(--text); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn svg { width: 16px; height: 16px; }
    .pdf-wrap {
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: 18px; overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .pdf-wrap iframe, .pdf-wrap embed {
      display: block; width: 100%; height: 1100px; border: 0; background: white;
    }
    footer {
      max-width: var(--max); margin: 0 auto; padding: 24px;
      color: var(--text-dim); font-size: 13.5px;
      border-top: 1px solid var(--line);
    }
  </style>
</head>
